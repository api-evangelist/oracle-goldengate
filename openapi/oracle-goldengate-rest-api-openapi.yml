components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: HTTP Basic authentication with GoldenGate user credentials
  parameters:
    deploymentParam:
      name: deployment
      in: path
      required: true
      description: Name of the GoldenGate deployment
      schema:
        type: string
    serviceParam:
      name: service
      in: path
      required: true
      description: Name of the service within a deployment
      schema:
        type: string
    extractParam:
      name: extract
      in: path
      required: true
      description: Name of the Extract process
      schema:
        type: string
    replicatParam:
      name: replicat
      in: path
      required: true
      description: Name of the Replicat process
      schema:
        type: string
    domainParam:
      name: domain
      in: path
      required: true
      description: Credential store domain name
      schema:
        type: string
    aliasParam:
      name: alias
      in: path
      required: true
      description: Credential alias name
      schema:
        type: string
    connectionParam:
      name: connection
      in: path
      required: true
      description: Name of the database connection
      schema:
        type: string
    distpathParam:
      name: distpath
      in: path
      required: true
      description: Name of the distribution path
      schema:
        type: string
    pathParam:
      name: path
      in: path
      required: true
      description: Name of the collector/receiver path
      schema:
        type: string
    taskParam:
      name: task
      in: path
      required: true
      description: Name of the automated task
      schema:
        type: string
    roleParam:
      name: role
      in: path
      required: true
      description: Authorization role name
      schema:
        type: string
        enum:
          - Security
          - Administrator
          - Operator
          - User
    userParam:
      name: user
      in: path
      required: true
      description: Username
      schema:
        type: string
    reportParam:
      name: report
      in: path
      required: true
      description: Report identifier
      schema:
        type: string
    mpointItemParam:
      name: item
      in: path
      required: true
      description: Process name or identifier for metrics
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad request - invalid parameters or request body
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: The requested resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          description: HTTP status code
        message:
          type: string
          description: Error message
        severity:
          type: string
          description: Error severity level
    ApiVersionList:
      type: object
      properties:
        versions:
          type: array
          items:
            type: object
            properties:
              version:
                type: string
              isLatest:
                type: boolean
              links:
                type: array
                items:
                  $ref: '#/components/schemas/Link'
    ApiVersionDetails:
      type: object
      properties:
        version:
          type: string
        isLatest:
          type: boolean
        lifecycle:
          type: string
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'
    Link:
      type: object
      properties:
        rel:
          type: string
        href:
          type: string
        mediaType:
          type: string
    ConfigSummary:
      type: object
      properties:
        serviceType:
          type: string
        status:
          type: string
        host:
          type: string
        port:
          type: integer
        deploymentName:
          type: string
    ServiceHealthDetails:
      type: object
      properties:
        healthy:
          type: boolean
        services:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              status:
                type: string
              port:
                type: integer
              secure:
                type: boolean
    HealthCheckSummary:
      type: object
      properties:
        healthy:
          type: boolean
        status:
          type: string
        timestamp:
          type: string
          format: date-time
    DeploymentList:
      type: object
      properties:
        deployments:
          type: array
          items:
            $ref: '#/components/schemas/DeploymentSummary'
    DeploymentSummary:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
        description:
          type: string
    Deployment:
      type: object
      properties:
        name:
          type: string
          description: Unique name of the deployment
        status:
          type: string
          description: Current status of the deployment
          enum:
            - running
            - stopped
            - error
        description:
          type: string
          description: Description of the deployment
        oggHome:
          type: string
          description: Oracle GoldenGate home directory
        oggVersion:
          type: string
          description: GoldenGate software version
        environmentVariables:
          type: object
          additionalProperties:
            type: string
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceSummary'
    CreateDeploymentRequest:
      type: object
      required:
        - oggHome
      properties:
        oggHome:
          type: string
          description: Oracle GoldenGate home directory path
        description:
          type: string
        environmentVariables:
          type: object
          additionalProperties:
            type: string
        autoStart:
          type: boolean
          description: Whether to automatically start the deployment
    UpdateDeploymentRequest:
      type: object
      properties:
        description:
          type: string
        environmentVariables:
          type: object
          additionalProperties:
            type: string
        autoStart:
          type: boolean
    ServiceList:
      type: object
      properties:
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceSummary'
    ServiceSummary:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        status:
          type: string
        port:
          type: integer
    Service:
      type: object
      properties:
        name:
          type: string
          description: Service name
        type:
          type: string
          description: Service type
          enum:
            - AdminServer
            - DistributionServer
            - ReceiverServer
            - PerformanceMetricsServer
        status:
          type: string
          description: Service status
          enum:
            - running
            - stopped
            - error
        port:
          type: integer
          description: Service listening port
