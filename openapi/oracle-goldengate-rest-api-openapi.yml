openapi: 3.1.0
info:
  title: Oracle GoldenGate REST API
  description: >-
    RESTful API for managing Oracle GoldenGate Microservices Architecture,
    including deployment configuration, extract and replicat process management,
    credentials, database connections, distribution and receiver services,
    performance metrics, and monitoring. Based on Oracle GoldenGate 21c
    Microservices Architecture REST API documentation.
  version: 21.3.0
  contact:
    name: Oracle Support
    url: https://support.oracle.com
  license:
    name: Oracle Technology Network License
    url: https://www.oracle.com/legal/terms.html
  x-documentation:
    - url: https://docs.oracle.com/en/middleware/goldengate/core/21.3/oggra/index.html
      description: Oracle GoldenGate REST API Reference 21c
    - url: https://docs.oracle.com/en/database/goldengate/core/26/oggra/index.html
      description: Oracle GoldenGate REST API Reference 26ai
servers:
  - url: https://{goldengate-host}:{port}
    description: Oracle GoldenGate Microservices server
    variables:
      goldengate-host:
        default: localhost
        description: GoldenGate Microservices host
      port:
        default: '443'
        description: HTTPS port for the service
security:
  - basicAuth: []
tags:
  - name: Deployments
    description: Manage GoldenGate deployments via the Service Manager
  - name: Services
    description: Manage services within a deployment
  - name: Extracts
    description: Configure and manage Extract processes
  - name: Replicats
    description: Configure and manage Replicat processes
  - name: Credentials
    description: Manage credential store domains and aliases
  - name: Connections
    description: Manage database connections
  - name: Heartbeat
    description: Manage heartbeat tables for lag monitoring
  - name: Configuration
    description: Manage configuration settings and files
  - name: Encryption
    description: Manage encryption keys and profiles
  - name: Trails
    description: Manage trail files
  - name: Distribution
    description: Manage distribution paths for data delivery
  - name: Receiver
    description: Manage receiver/collector paths
  - name: Monitoring
    description: Performance metrics and monitoring
  - name: Tasks
    description: Manage automated tasks
  - name: Users
    description: User management and authorization
  - name: Certificates
    description: Manage SSL/TLS certificates
  - name: Logs
    description: Access service and process logs
  - name: Commands
    description: Execute GoldenGate commands
paths:
  /services:
    get:
      operationId: getApiVersions
      summary: Retrieve API versions
      description: Returns the list of available REST API versions supported by this GoldenGate instance.
      tags:
        - Configuration
      responses:
        '200':
          description: Successfully retrieved API versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiVersionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /services/v2:
    get:
      operationId: describeApiVersion
      summary: Describe API version v2
      description: Returns details about the v2 REST API including available resources and metadata.
      tags:
        - Configuration
      responses:
        '200':
          description: Successfully retrieved API version details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiVersionDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /services/v2/config/summary:
    get:
      operationId: getConfigSummary
      summary: Get service configuration summary
      description: Returns a summary of the current service configuration.
      tags:
        - Configuration
      responses:
        '200':
          description: Configuration summary retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /services/v2/config/health:
    get:
      operationId: getServiceHealthDetails
      summary: Get service health details
      description: Returns detailed health information for the GoldenGate service, including status of all components.
      tags:
        - Monitoring
      responses:
        '200':
          description: Service health details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceHealthDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /services/v2/config/health/check:
    get:
      operationId: getServiceHealthCheck
      summary: Get service health summary check
      description: Returns a quick health check summary indicating overall service status.
      tags:
        - Monitoring
      responses:
        '200':
          description: Health check passed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /services/v2/deployments:
    get:
      operationId: listDeployments
      summary: List all deployments
      description: Returns a list of all GoldenGate deployments managed by the Service Manager.
      tags:
        - Deployments
      responses:
        '200':
          description: Successfully retrieved deployment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /services/v2/deployments/{deployment}:
    get:
      operationId: getDeployment
      summary: Retrieve a deployment
      description: Returns the configuration details of a specific GoldenGate deployment.
      tags:
        - Deployments
      parameters:
        - $ref: '#/components/parameters/deploymentParam'
      responses:
        '200':
          description: Deployment details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createDeployment
      summary: Create a deployment
      description: Creates a new GoldenGate deployment with the specified configuration.
      tags:
        - Deployments
      parameters:
        - $ref: '#/components/parameters/deploymentParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeploymentRequest'
      responses:
        '201':
          description: Deployment created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
    patch:
      operationId: updateDeployment
      summary: Update a deployment
      description: Updates configuration properties of an existing GoldenGate deployment.
      tags:
        - Deployments
      parameters:
        - $ref: '#/components/parameters/deploymentParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeploymentRequest'
      responses:
        '200':
          description: Deployment updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteDeployment
      summary: Remove a deployment
      description: Removes a GoldenGate deployment and its associated services.
      tags:
        - Deployments
      parameters:
        - $ref: '#/components/parameters/deploymentParam'
      responses:
        '204':
          description: Deployment removed successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/v2/deployments/{deployment}/services:
    get:
      operationId: listServices
      summary: List services for a deployment
      description: Returns a list of all services configured within a specific deployment.
      tags:
        - Services
      parameters:
        - $ref: '#/components/parameters/deploymentParam'
      responses:
        '200':
          description: Successfully retrieved service list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/v2/deployments/{deployment}/services/{service}:
    get:
      operationId: getService
      summary: Retrieve a service
      description: Returns the configuration and status of a specific service within a deployment.
      tags:
        - Services
      parameters:
        - $ref: '#/components/parameters/deploymentParam'
        - $ref: '#/components/parameters/serviceParam'
      responses:
        '200':
          description: Service details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createService
      summary: Create a service
      description: Creates a new service within a deployment.
      tags:
        - Services
      parameters:
        - $ref: '#/components/parameters/deploymentParam'
        - $ref: '#/components/parameters/serviceParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServiceRequest'
      responses:
        '201':
          description: Service created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      operationId: updateService
      summary: Update service properties
      description: Updates the configuration properties of an existing service.
      tags:
        - Services
      parameters:
        - $ref: '#/components/parameters/deploymentParam'
        - $ref: '#/components/parameters/serviceParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateServiceRequest'
      responses:
        '200':
          description: Service updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteService
      summary: Remove a service
      description: Removes a service from a deployment.
      tags:
        - Services
      parameters:
        - $ref: '#/components/parameters/deploymentParam'
        - $ref: '#/components/parameters/serviceParam'
      responses:
        '204':
          description: Service removed successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/v2/extracts:
    get:
      operationId: listExtracts
      summary: List all Extract processes
      description: Returns a list of all Extract processes configured in the GoldenGate instance.
      tags:
        - Extracts
      responses:
        '200':
          description: Successfully retrieved extract list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtractList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /services/v2/extracts/{extract}:
    get:
      operationId: getExtract
      summary: Retrieve an Extract process
      description: Returns the configuration and current status of a specific Extract process.
      tags:
        - Extracts
      parameters:
        - $ref: '#/components/parameters/extractParam'
      responses:
        '200':
          description: Extract details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Extract'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createExtract
      summary: Create an Extract process
      description: >-
        Creates a new Extract process with the specified configuration. Supports
        initial-load, change-data-capture, and data-pump extract types.
      tags:
        - Extracts
      parameters:
        - $ref: '#/components/parameters/extractParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExtractRequest'
      responses:
        '201':
          description: Extract created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Extract'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
    patch:
      operationId: updateExtract
      summary: Update an Extract process
      description: Updates the configuration of an existing Extract process.
      tags:
        - Extracts
      parameters:
        - $ref: '#/components/parameters/extractParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExtractRequest'
      responses:
        '200':
          description: Extract updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Extract'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteExtract
      summary: Delete an Extract process
      description: Deletes an Extract process and optionally its associated trail files.
      tags:
        - Extracts
      parameters:
        - $ref: '#/components/parameters/extractParam'
      responses:
        '204':
          description: Extract deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/v2/extracts/{extract}/command:
    post:
      operationId: issueExtractCommand
      summary: Issue a command to an Extract
      description: >-
        Issues an operational command to an Extract process such as START, STOP,
        KILL, STATUS, STATS, LAG, or INFO.
      tags:
        - Extracts
      parameters:
        - $ref: '#/components/parameters/extractParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessCommand'
      responses:
        '200':
          description: Command executed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/v2/extracts/{extract}/info/status:
    get:
      operationId: getExtractStatus
      summary: Retrieve Extract status
      description: Returns the current runtime status of an Extract process including lag, checkpoint, and position information.
      tags:
        - Extracts
      parameters:
        - $ref: '#/components/parameters/extractParam'
      responses:
        '200':
          description: Extract status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/v2/extracts/{extract}/info/checkpoints:
    get:
      operationId: getExtractCheckpoints
      summary: Retrieve Extract checkpoints
      description: Returns checkpoint information for an Extract process.
      tags:
        - Extracts
      parameters:
        - $ref: '#/components/parameters/extractParam'
      responses:
        '200':
          description: Extract checkpoints retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Checkpoints'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/v2/extracts/{extract}/info/reports:
    get:
      operationId: listExtractReports
      summary: List Extract reports
      description: Returns a list of available process reports for an Extract.
      tags:
        - Extracts
      parameters:
        - $ref: '#/components/parameters/extractParam'
      responses:
        '200':
          description: Extract reports listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/v2/extracts/{extract}/info/reports/{report}:
    get:
      operationId: getExtractReport
      summary: Retrieve a specific Extract report
      description: Returns the content of a specific Extract process report.
      tags:
        - Extracts
      parameters:
        - $ref: '#/components/parameters/extractParam'
        - $ref: '#/components/parameters/reportParam'
      responses:
        '200':
          description: Report content retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/v2/extracts/{extract}/info/logs:
    get:
      operationId: listExtractLogs
      summary: List Extract logs
      description: Returns a list of available log files for an Extract process.
      tags:
        - Extracts
      parameters:
        - $ref: '#/components/parameters/extractParam'
      responses:
        '200':
          description: Extract logs listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/v2/extracts/{extract}/info/history:
    get:
      operationId: getExtractHistory
      summary: Retrieve Extract history
      description: Returns the processing history for an Extract.
      tags:
        - Extracts
      parameters:
        - $ref: '#/components/parameters/extractParam'
      responses:
        '200':
          description: History retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessHistory'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/v2/replicats:
    get:
      operationId: listReplicats
      summary: List all Replicat processes
      description: Returns a list of all Replicat processes configured in the GoldenGate instance.
      tags:
        - Replicats
      responses:
        '200':
          description: Successfully retrieved replicat list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplicatList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /services/v2/replicats/{replicat}:
    get:
      operationId: getReplicat
      summary: Retrieve a Replicat process
      description: Returns the configuration and current status of a specific Replicat process.
      tags:
        - Replicats
      parameters:
        - $ref: '#/components/parameters/replicatParam'
      responses:
        '200':
          description: Replicat details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Replicat'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createReplicat
      summary: Create a Replicat process
      description: >-
        Creates a new Replicat process. Supports classic, coordinated, integrated,
        and parallel replicat types.
      tags:
        - Replicats
      parameters:
        - $ref: '#/components/parameters/replicatParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReplicatRequest'
      responses:
        '201':
          description: Replicat created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Replicat'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
    patch:
      operationId: updateReplicat
      summary: Update a Replicat process
      description: Updates the configuration of an existing Replicat process.
      tags:
        - Replicats
      parameters:
        - $ref: '#/components/parameters/replicatParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReplicatRequest'
      responses:
        '200':
          description: Replicat updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Replicat'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteReplicat
      summary: Delete a Replicat process
      description: Deletes a Replicat process from the GoldenGate instance.
      tags:
        - Replicats
      parameters:
        - $ref: '#/components/parameters/replicatParam'
      responses:
        '204':
          description: Replicat deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/v2/replicats/{replicat}/command:
    post:
      operationId: issueReplicatCommand
      summary: Issue a command to a Replicat
      description: >-
        Issues an operational command to a Replicat process such as START, STOP,
        KILL, STATUS, STATS, LAG, or INFO.
      tags:
        - Replicats
      parameters:
        - $ref: '#/components/parameters/replicatParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessCommand'
      responses:
        '200':
          description: Command executed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/v2/replicats/{replicat}/info/status:
    get:
      operationId: getReplicatStatus
      summary: Retrieve Replicat status
      description: Returns the current runtime status of a Replicat process.
      tags:
        - Replicats
      parameters:
        - $ref: '#/components/parameters/replicatParam'
      responses:
        '200':
          description: Replicat status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/v2/replicats/{replicat}/info/checkpoints:
    get:
      operationId: getReplicatCheckpoints
      summary: Retrieve Replicat checkpoints
      description: Returns checkpoint information for a Replicat process.
      tags:
        - Replicats
      parameters:
        - $ref: '#/components/parameters/replicatParam'
      responses:
        '200':
          description: Replicat checkpoints retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Checkpoints'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/v2/replicats/{replicat}/info/reports:
    get:
      operationId: listReplicatReports
      summary: List Replicat reports
      description: Returns a list of available process reports for a Replicat.
      tags:
        - Replicats
      parameters:
        - $ref: '#/components/parameters/replicatParam'
      responses:
        '200':
          description: Replicat reports listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/v2/replicats/{replicat}/info/history:
    get:
      operationId: getReplicatHistory
      summary: Retrieve Replicat history
      description: Returns the processing history for a Replicat.
      tags:
        - Replicats
      parameters:
        - $ref: '#/components/parameters/replicatParam'
      responses:
        '200':
          description: History retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessHistory'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/v2/credentials:
    get:
      operationId: listCredentialDomains
      summary: List credential domains
      description: Returns a list of all credential store domains.
      tags:
        - Credentials
      responses:
        '200':
          description: Credential domains listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialDomainList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /services/v2/credentials/{domain}:
    get:
      operationId: listDomainAliases
      summary: List aliases in a credential domain
      description: Returns all credential aliases within a specified domain.
      tags:
        - Credentials
      parameters:
        - $ref: '#/components/parameters/domainParam'
      responses:
        '200':
          description: Aliases listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialAliasList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/v2/credentials/{domain}/{alias}:
    get:
      operationId: getCredentialAlias
      summary: Retrieve a credential alias
      description: Returns details of a specific credential alias.
      tags:
        - Credentials
      parameters:
        - $ref: '#/components/parameters/domainParam'
        - $ref: '#/components/parameters/aliasParam'
      responses:
        '200':
          description: Alias details retrieved
          content:
            application/json:
              schema:
