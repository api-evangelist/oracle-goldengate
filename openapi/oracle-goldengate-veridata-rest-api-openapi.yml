openapi: 3.1.0
info:
  title: Oracle GoldenGate Veridata REST API
  description: >-
    REST API for Oracle GoldenGate Veridata, a data comparison and repair
    solution that verifies data consistency between source and target databases.
    Provides operations for managing connections, compare groups, compare pairs,
    jobs, profiles, monitoring comparison results, and repairing out-of-sync
    data. Based on Oracle GoldenGate Veridata 23c REST API documentation.
  version: '1.0'
  contact:
    name: Oracle Support
    url: https://support.oracle.com
  license:
    name: Oracle Technology Network License
    url: https://www.oracle.com/legal/terms.html
  x-documentation:
    - url: https://docs.oracle.com/en/middleware/goldengate/veridata/23/ggvra/rest-endpoints.html
      description: Oracle GoldenGate Veridata REST API Reference
servers:
  - url: https://{veridata-host}:{port}/veridata/v1
    description: Oracle GoldenGate Veridata server
    variables:
      veridata-host:
        default: localhost
        description: Veridata server host
      port:
        default: '8830'
        description: Veridata HTTPS port
security:
  - basicAuth: []
tags:
  - name: Server
    description: Server information and configuration
  - name: Connections
    description: Manage source and target database connections
  - name: Groups
    description: Manage compare groups
  - name: Compare Pairs
    description: Manage compare pairs within groups
  - name: Jobs
    description: Manage and execute comparison jobs
  - name: Profiles
    description: Manage comparison profiles
  - name: Monitoring
    description: Monitor comparison and repair statistics
  - name: Execution
    description: Run and stop comparison jobs
  - name: Repair
    description: Repair out-of-sync data
  - name: Import/Export
    description: Import and export Veridata configurations
  - name: Users
    description: User and user group management
  - name: Logs
    description: Access server logs
  - name: Validation
    description: Validate connections and configurations
paths:
  /services/server/info:
    get:
      operationId: getServerInfo
      summary: Retrieve server details
      description: Returns server information including version, uptime, and system details.
      tags:
        - Server
      responses:
        '200':
          description: Server information retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /services/server/configuration:
    get:
      operationId: getServerConfiguration
      summary: Retrieve server configurations
      description: Returns the current server configuration settings.
      tags:
        - Server
      responses:
        '200':
          description: Configuration retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerConfiguration'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      operationId: updateServerConfiguration
      summary: Update server configurations
      description: Updates server configuration settings.
      tags:
        - Server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateServerConfigurationRequest'
      responses:
        '200':
          description: Configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerConfiguration'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /services/server/configuration/reset:
    put:
      operationId: resetServerConfiguration
      summary: Reset server configurations to default
      description: Resets all server configuration settings to their factory default values.
      tags:
        - Server
      responses:
        '200':
          description: Configuration reset to defaults
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerConfiguration'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /services/configuration/connections:
    get:
      operationId: listConnections
      summary: Retrieve all connections
      description: Returns a list of all configured source and target database connections.
      tags:
        - Connections
      responses:
        '200':
          description: Connections listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createConnection
      summary: Create a connection
      description: Creates a new database connection for use as a source or target in comparisons.
      tags:
        - Connections
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConnectionRequest'
      responses:
        '201':
          description: Connection created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Connection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /services/configuration/connections/{Id}:
    get:
      operationId: getConnection
      summary: Retrieve a connection
      description: Returns the details of a specific database connection.
      tags:
        - Connections
      parameters:
        - $ref: '#/components/parameters/connectionIdParam'
      responses:
        '200':
          description: Connection retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Connection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateConnection
      summary: Update a connection
      description: Updates properties of an existing database connection.
      tags:
        - Connections
      parameters:
        - $ref: '#/components/parameters/connectionIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConnectionRequest'
      responses:
        '200':
          description: Connection updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Connection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteConnection
      summary: Delete a connection
      description: Deletes a database connection.
      tags:
        - Connections
      parameters:
        - $ref: '#/components/parameters/connectionIdParam'
      responses:
        '204':
          description: Connection deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/configuration/connections/{Id}/status:
    get:
      operationId: getConnectionStatus
      summary: Retrieve connection status
      description: Returns the connectivity status of a database connection.
      tags:
        - Connections
      parameters:
        - $ref: '#/components/parameters/connectionIdParam'
      responses:
        '200':
          description: Connection status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/configuration/connections/{Id}/metadata:
    post:
      operationId: getConnectionMetadata
      summary: Retrieve connection metadata
      description: Returns database metadata (schemas, tables, columns) for a connection.
      tags:
        - Connections
      parameters:
        - $ref: '#/components/parameters/connectionIdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetadataRequest'
      responses:
        '200':
          description: Metadata retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionMetadata'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/configuration/groups:
    get:
      operationId: listGroups
      summary: Retrieve all compare groups
      description: Returns a list of all compare groups configured in Veridata.
      tags:
        - Groups
      responses:
        '200':
          description: Groups listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createGroup
      summary: Create a compare group
      description: Creates a new compare group linking source and target connections for data comparison.
      tags:
        - Groups
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
      responses:
        '201':
          description: Group created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /services/configuration/groups/{Id}:
    get:
      operationId: getGroup
      summary: Retrieve a compare group
      description: Returns the details of a specific compare group including its source and target connections.
      tags:
        - Groups
      parameters:
        - $ref: '#/components/parameters/groupIdParam'
      responses:
        '200':
          description: Group retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateGroup
      summary: Update a compare group
      description: Updates properties of an existing compare group.
      tags:
        - Groups
      parameters:
        - $ref: '#/components/parameters/groupIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupRequest'
      responses:
        '200':
          description: Group updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteGroup
      summary: Delete a compare group
      description: Deletes a compare group and its associated compare pairs.
      tags:
        - Groups
      parameters:
        - $ref: '#/components/parameters/groupIdParam'
      responses:
        '204':
          description: Group deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/configuration/groups/clone/{Id}:
    post:
      operationId: cloneGroup
      summary: Clone a compare group
      description: Creates a copy of an existing compare group including all its compare pairs.
      tags:
        - Groups
      parameters:
        - $ref: '#/components/parameters/groupIdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloneGroupRequest'
      responses:
        '201':
          description: Group cloned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/configuration/groups/validate/{Id}:
    post:
      operationId: validateGroup
      summary: Validate a compare group
      description: Validates the configuration of a compare group including connection and table accessibility.
      tags:
        - Validation
      parameters:
        - $ref: '#/components/parameters/groupIdParam'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/configuration/cps/group/{groupId}:
    post:
      operationId: createComparePairs
      summary: Create compare pairs in a group
      description: Creates one or more compare pairs within a specific compare group.
      tags:
        - Compare Pairs
      parameters:
        - $ref: '#/components/parameters/groupIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateComparePairsRequest'
      responses:
        '201':
          description: Compare pairs created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComparePairList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /services/configuration/cps/{Id}:
    get:
      operationId: getComparePair
      summary: Retrieve a compare pair
      description: Returns the details of a specific compare pair including source and target table mappings.
      tags:
        - Compare Pairs
      parameters:
        - $ref: '#/components/parameters/comparePairIdParam'
      responses:
        '200':
          description: Compare pair retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComparePair'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: replaceComparePair
      summary: Replace a compare pair
      description: Replaces the configuration of an existing compare pair.
      tags:
        - Compare Pairs
      parameters:
        - $ref: '#/components/parameters/comparePairIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceComparePairRequest'
      responses:
        '200':
          description: Compare pair replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComparePair'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteComparePair
      summary: Delete a compare pair
      description: Deletes a compare pair from its group.
      tags:
        - Compare Pairs
      parameters:
        - $ref: '#/components/parameters/comparePairIdParam'
      responses:
        '204':
          description: Compare pair deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/configuration/cps/{Id}/colmap:
    post:
      operationId: generateColumnMappings
      summary: Generate column mapping pairs
      description: Automatically generates column mappings between source and target tables for a compare pair.
      tags:
        - Compare Pairs
      parameters:
        - $ref: '#/components/parameters/comparePairIdParam'
      responses:
        '200':
          description: Column mappings generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ColumnMappingList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/configuration/cps/validate/{Id}:
    post:
      operationId: validateComparePair
      summary: Validate a compare pair
      description: Validates the configuration of a compare pair including table and column accessibility.
      tags:
        - Validation
      parameters:
        - $ref: '#/components/parameters/comparePairIdParam'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/configuration/cps/mappings:
    post:
      operationId: generateMappingObjects
      summary: Generate mapping objects from rules
      description: Generates compare pair mappings based on mapping rules for automatic pair creation.
      tags:
        - Compare Pairs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MappingRulesRequest'
      responses:
        '200':
          description: Mapping objects generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MappingObjectList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /services/configuration/jobs:
    get:
      operationId: listJobs
      summary: Retrieve all jobs
      description: Returns a list of all comparison jobs configured in Veridata.
      tags:
        - Jobs
      responses:
        '200':
          description: Jobs listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createJob
      summary: Create a job
      description: >-
        Creates a new comparison job that references one or more compare groups.
        Jobs control the execution of data comparisons.
      tags:
        - Jobs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobRequest'
      responses:
        '201':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /services/configuration/jobs/{Id}:
    get:
      operationId: getJob
      summary: Retrieve a job
      description: Returns the details of a specific comparison job.
      tags:
        - Jobs
      parameters:
        - $ref: '#/components/parameters/jobIdParam'
      responses:
        '200':
          description: Job retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: replaceJob
      summary: Replace a job
      description: Replaces the configuration of an existing comparison job.
      tags:
        - Jobs
      parameters:
        - $ref: '#/components/parameters/jobIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceJobRequest'
      responses:
        '200':
          description: Job replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteJob
      summary: Delete a job
      description: Deletes a comparison job.
      tags:
        - Jobs
      parameters:
        - $ref: '#/components/parameters/jobIdParam'
      responses:
        '204':
          description: Job deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/configuration/profiles:
    get:
      operationId: listProfiles
      summary: Retrieve all profiles
      description: Returns a list of all comparison profiles that define comparison behavior settings.
      tags:
        - Profiles
      responses:
        '200':
          description: Profiles listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createProfile
      summary: Create a profile
      description: Creates a new comparison profile with custom comparison settings.
      tags:
        - Profiles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProfileRequest'
      responses:
        '201':
          description: Profile created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /services/configuration/profiles/{Id}:
    get:
      operationId: getProfile
      summary: Retrieve a profile
      description: Returns the details of a specific comparison profile.
      tags:
        - Profiles
      parameters:
        - $ref: '#/components/parameters/profileIdParam'
      responses:
        '200':
          description: Profile retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateProfile
      summary: Update a profile
      description: Updates properties of an existing comparison profile.
      tags:
        - Profiles
      parameters:
        - $ref: '#/components/parameters/profileIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteProfile
      summary: Delete a profile
      description: Deletes a comparison profile.
      tags:
        - Profiles
      parameters:
        - $ref: '#/components/parameters/profileIdParam'
      responses:
        '204':
          description: Profile deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/configuration/profiles/{Id}/reset:
    put:
      operationId: resetProfile
      summary: Reset a profile to defaults
      description: Resets a comparison profile to its default settings.
      tags:
        - Profiles
      parameters:
        - $ref: '#/components/parameters/profileIdParam'
      responses:
        '200':
          description: Profile reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/execution/jobs/{Id}:
    post:
      operationId: runJob
      summary: Run a comparison job
      description: Starts execution of a comparison job to compare data between source and target databases.
      tags:
        - Execution
      parameters:
        - $ref: '#/components/parameters/jobIdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunJobRequest'
      responses:
        '200':
          description: Job started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobExecution'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/execution/jobs/{runId}/stop:
    post:
      operationId: stopJob
      summary: Stop a running job
      description: Stops a currently running comparison job or specific compare pairs within it.
      tags:
        - Execution
      parameters:
        - $ref: '#/components/parameters/runIdParam'
      responses:
        '200':
          description: Job stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobExecution'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/monitoring/jobs:
    get:
      operationId: getJobStatistics
      summary: Retrieve job statistics
      description: Returns comparison statistics for completed and running jobs.
      tags:
        - Monitoring
      responses:
        '200':
          description: Job statistics retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobStatisticsList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /services/monitoring/cps:
    get:
      operationId: getComparePairStatistics
      summary: Retrieve compare pair statistics
      description: Returns detailed comparison statistics at the compare pair level.
      tags:
        - Monitoring
      responses:
        '200':
          description: Compare pair statistics retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComparePairStatisticsList'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /services/oos/{runId}:
    get:
      operationId: getOutOfSyncData
      summary: Retrieve out-of-sync data
      description: Returns the rows identified as out-of-sync during a comparison run.
      tags:
        - Monitoring
      parameters:
        - $ref: '#/components/parameters/runIdParam'
      responses:
        '200':
          description: Out-of-sync data retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutOfSyncData'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/monitoring/comparison/{runId}/reports:
    get:
      operationId: getComparisonReport
      summary: Retrieve comparison report
      description: Returns a detailed comparison report for a specific job run.
      tags:
        - Monitoring
      parameters:
        - $ref: '#/components/parameters/runIdParam'
      responses:
        '200':
          description: Report retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComparisonReport'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/repair/jobs/{runId}:
    post:
      operationId: repairJob
      summary: Repair out-of-sync data
      description: Initiates a repair operation to synchronize out-of-sync rows found during a comparison.
      tags:
        - Repair
      parameters:
        - $ref: '#/components/parameters/runIdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RepairJobRequest'
      responses:
        '200':
          description: Repair initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepairExecution'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
