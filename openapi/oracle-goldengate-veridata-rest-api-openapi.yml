      tags:
        - Logs
      parameters:
        - name: logType
          in: query
          schema:
            type: string
            enum:
              - api
              - perf
              - both
        - name: logLevel
          in: query
          schema:
            type: string
            enum:
              - ERROR
              - WARNING
              - INFO
              - DEBUG
        - name: lastLines
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Logs retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerLogs'
