        '401':
          $ref: '#/components/responses/Unauthorized'
  /session/invalidate:
    get:
      operationId: invalidateSession
      summary: Invalidate session (logout)
      description: Invalidates the current user session.
      tags:
        - Server
      responses:
        '200':
          description: Session invalidated
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: HTTP Basic authentication with Veridata credentials
  parameters:
    connectionIdParam:
      name: Id
      in: path
      required: true
      description: Connection identifier
      schema:
        type: integer
        format: int64
    groupIdParam:
      name: Id
      in: path
      required: true
      description: Compare group identifier
      schema:
        type: integer
        format: int64
    groupIdPathParam:
      name: groupId
      in: path
      required: true
      description: Compare group identifier
      schema:
        type: integer
        format: int64
    comparePairIdParam:
      name: Id
      in: path
      required: true
      description: Compare pair identifier
      schema:
        type: integer
        format: int64
    jobIdParam:
      name: Id
      in: path
      required: true
      description: Job identifier
      schema:
        type: integer
        format: int64
    profileIdParam:
      name: Id
      in: path
      required: true
      description: Profile identifier
      schema:
        type: integer
        format: int64
    runIdParam:
      name: runId
      in: path
      required: true
      description: Job or repair run identifier
      schema:
        type: integer
        format: int64
    userIdParam:
      name: Id
      in: path
      required: true
      description: User identifier
      schema:
        type: integer
        format: int64
    userGroupIdParam:
      name: Id
      in: path
      required: true
      description: User group identifier
      schema:
        type: integer
        format: int64
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
    ServerInfo:
      type: object
      properties:
        version:
          type: string
        buildNumber:
          type: string
        uptime:
          type: string
        javaVersion:
          type: string
    ServerConfiguration:
      type: object
      properties:
        maxConcurrentJobs:
          type: integer
        maxThreadsPerJob:
          type: integer
        reportRetentionDays:
          type: integer
        oosRetentionDays:
          type: integer
    UpdateServerConfigurationRequest:
      type: object
      properties:
        maxConcurrentJobs:
          type: integer
        maxThreadsPerJob:
          type: integer
        reportRetentionDays:
          type: integer
    ConnectionList:
      type: object
      properties:
        connections:
          type: array
          items:
            $ref: '#/components/schemas/Connection'
    Connection:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        databaseType:
          type: string
          enum:
            - Oracle
            - MySQL
            - SQL Server
            - PostgreSQL
            - DB2
            - Sybase
            - Teradata
        host:
          type: string
        port:
          type: integer
        serviceName:
          type: string
        schema:
          type: string
        agentHost:
          type: string
        agentPort:
          type: integer
    CreateConnectionRequest:
      type: object
      required:
        - name
        - databaseType
        - host
        - port
      properties:
        name:
          type: string
        description:
          type: string
        databaseType:
          type: string
        host:
          type: string
        port:
          type: integer
        serviceName:
          type: string
        schema:
          type: string
        username:
          type: string
        password:
          type: string
          format: password
        agentHost:
          type: string
        agentPort:
          type: integer
    UpdateConnectionRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        host:
          type: string
        port:
          type: integer
        username:
          type: string
        password:
          type: string
          format: password
    ConnectionStatus:
      type: object
      properties:
        connectionId:
          type: integer
          format: int64
        status:
          type: string
          enum:
            - connected
            - disconnected
            - error
        message:
          type: string
    MetadataRequest:
      type: object
      properties:
        schemaPattern:
          type: string
        tablePattern:
          type: string
    ConnectionMetadata:
      type: object
      properties:
        schemas:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              tables:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    columns:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                          dataType:
                            type: string
                          nullable:
                            type: boolean
                          primaryKey:
                            type: boolean
    GroupList:
      type: object
      properties:
        groups:
          type: array
          items:
            $ref: '#/components/schemas/Group'
    Group:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        sourceConnectionId:
          type: integer
          format: int64
        targetConnectionId:
          type: integer
          format: int64
        profileId:
          type: integer
          format: int64
        comparePairCount:
          type: integer
    CreateGroupRequest:
      type: object
      required:
        - name
        - sourceConnectionId
        - targetConnectionId
      properties:
        name:
          type: string
        description:
          type: string
        sourceConnectionId:
          type: integer
          format: int64
        targetConnectionId:
          type: integer
          format: int64
        profileId:
          type: integer
          format: int64
    UpdateGroupRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        profileId:
          type: integer
          format: int64
    CloneGroupRequest:
      type: object
      properties:
        newName:
          type: string
    ComparePairList:
      type: object
      properties:
        comparePairs:
          type: array
          items:
            $ref: '#/components/schemas/ComparePair'
    ComparePair:
      type: object
      properties:
        id:
          type: integer
          format: int64
        groupId:
          type: integer
          format: int64
        sourceSchema:
          type: string
        sourceTable:
          type: string
        targetSchema:
          type: string
        targetTable:
          type: string
        profileId:
          type: integer
          format: int64
        columnMappings:
          type: array
          items:
            $ref: '#/components/schemas/ColumnMapping'
    CreateComparePairsRequest:
      type: object
      properties:
        comparePairs:
          type: array
          items:
            type: object
            required:
              - sourceSchema
              - sourceTable
              - targetSchema
              - targetTable
            properties:
              sourceSchema:
                type: string
              sourceTable:
                type: string
              targetSchema:
                type: string
              targetTable:
                type: string
    ReplaceComparePairRequest:
      type: object
      properties:
        sourceSchema:
          type: string
        sourceTable:
          type: string
        targetSchema:
          type: string
        targetTable:
          type: string
        profileId:
          type: integer
          format: int64
    ColumnMapping:
      type: object
      properties:
        sourceColumn:
          type: string
        targetColumn:
          type: string
        dataType:
          type: string
    ColumnMappingList:
      type: object
      properties:
        mappings:
          type: array
          items:
            $ref: '#/components/schemas/ColumnMapping'
    MappingRulesRequest:
      type: object
      properties:
        sourceSchemaPattern:
          type: string
        targetSchemaPattern:
          type: string
        tablePattern:
          type: string
    MappingObjectList:
      type: object
      properties:
        mappings:
          type: array
          items:
            type: object
            properties:
              sourceSchema:
                type: string
              sourceTable:
                type: string
              targetSchema:
                type: string
              targetTable:
                type: string
    ValidationResult:
      type: object
      properties:
        valid:
          type: boolean
        messages:
          type: array
          items:
            type: object
            properties:
              severity:
                type: string
              message:
                type: string
    JobList:
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/Job'
    Job:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        groupIds:
          type: array
          items:
            type: integer
            format: int64
        profileId:
          type: integer
          format: int64
        status:
          type: string
          enum:
            - idle
            - running
            - completed
            - failed
    CreateJobRequest:
      type: object
      required:
        - name
        - groupIds
      properties:
        name:
          type: string
        description:
          type: string
        groupIds:
          type: array
          items:
            type: integer
            format: int64
        profileId:
          type: integer
          format: int64
    ReplaceJobRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        groupIds:
          type: array
          items:
            type: integer
            format: int64
        profileId:
          type: integer
          format: int64
    RunJobRequest:
      type: object
      properties:
        profileOverrides:
          type: object
          additionalProperties: true
    JobExecution:
      type: object
      properties:
        runId:
          type: integer
          format: int64
        jobId:
          type: integer
          format: int64
        status:
          type: string
          enum:
            - running
            - completed
            - stopped
            - failed
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
    ProfileList:
      type: object
      properties:
        profiles:
          type: array
          items:
            $ref: '#/components/schemas/Profile'
    Profile:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        comparisonMethod:
          type: string
          enum:
            - row
            - hash
        maxConcurrentComparePairs:
          type: integer
        deltaProcessing:
          type: boolean
        reportOutOfSync:
          type: boolean
    CreateProfileRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        comparisonMethod:
          type: string
          enum:
            - row
            - hash
        maxConcurrentComparePairs:
          type: integer
        deltaProcessing:
          type: boolean
    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        comparisonMethod:
          type: string
        maxConcurrentComparePairs:
          type: integer
    JobStatisticsList:
      type: object
      properties:
        statistics:
          type: array
          items:
            type: object
            properties:
              runId:
                type: integer
                format: int64
              jobName:
                type: string
              status:
                type: string
              startTime:
                type: string
                format: date-time
              endTime:
                type: string
                format: date-time
              totalComparePairs:
                type: integer
              inSyncCount:
                type: integer
              outOfSyncCount:
                type: integer
              failedCount:
                type: integer
    ComparePairStatisticsList:
      type: object
      properties:
        statistics:
          type: array
          items:
            type: object
            properties:
              comparePairId:
                type: integer
                format: int64
              sourceTable:
                type: string
              targetTable:
                type: string
              status:
                type: string
                enum:
                  - In Sync
                  - Out Of Sync
                  - Failed
              sourceRowCount:
                type: integer
                format: int64
              targetRowCount:
                type: integer
                format: int64
              outOfSyncRows:
                type: integer
                format: int64
    OutOfSyncData:
      type: object
      properties:
        runId:
          type: integer
          format: int64
        rows:
          type: array
          items:
            type: object
            properties:
              comparePairId:
                type: integer
                format: int64
              sourceTable:
                type: string
              targetTable:
                type: string
              oosType:
                type: string
